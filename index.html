<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Log Viewer</title>
<style>
  body {font-family: Arial, sans-serif; margin: 0; padding: 0;}
  .navbar {background: #333; color: #fff; padding: 10px;}
  .navbar a {color: #fff; margin-right: 10px; text-decoration: none;}
  .container {padding: 20px;}
  .log-entry {background: #f9f9f9; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd;}
  .log-entry:hover {background: #fff;}
  /* Block text selection – optional; may affect UX */
  /* * {user-select: none;} */
</style>
</head>
<body oncontextmenu="return false;">
  <div class="navbar">
    <a href="#" id="home-link">Home</a>
    <a href="#" id="logs-link">Logs</a>
  </div>
  <div class="container" id="log-container"></div>

  <script>
    /* =========================
       1️⃣  Global UI protection
       ========================= */
    // Block right‑click everywhere
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });

    // Block common key‑combos that open DevTools
    function blockInspectKeys(e) {
      const key = e.key || e.keyCode;
      // F12
      if (key === 'F12' || key === 123) {
        e.preventDefault();
        alert('Right‑click and DevTools are disabled on this page.');
        return;
      }
      // Ctrl+Shift+I, Ctrl+Shift+C, Ctrl+Shift+J, Ctrl+Shift+K, Ctrl+I
      if (
        (e.ctrlKey && e.shiftKey && (key === 'I' || key === 'C' || key === 'J' || key === 'K')) ||
        (e.ctrlKey && key === 'I')
      ) {
        e.preventDefault();
        alert('Right‑click and DevTools are disabled on this page.');
        return;
      }
    }
    document.addEventListener('keydown', blockInspectKeys);

    /* =========================
       2️⃣  DevTools detection
       ========================= */
    function detectDevTools() {
      const threshold = 160; // pixel difference threshold
      if (
        (window.outerWidth - window.innerWidth > threshold) ||
        (window.outerHeight - window.innerHeight > threshold)
      ) {
        alert('Developer tools detected! The page will reload.');
        location.reload();
      }
    }
    // Check once on load
    window.addEventListener('load', detectDevTools);
    // Periodically re‑check (every 1 s)
    setInterval(detectDevTools, 1000);

    /* =========================
       3️⃣  Optional UX tweaks
       ========================= */
    // Disable printing
    window.addEventListener('beforeprint', function (e) {
      e.preventDefault();
    });

    // Disable copy (may interfere with legitimate copy‑paste)
    document.addEventListener('copy', function (e) {
      e.preventDefault();
    });

    /* =========================
       4️⃣  Existing log viewer code
       ========================= */
    const logContainer = document.getElementById('log-container');
    const logs = [
      { timestamp: '2024‑04‑26T12:34:56Z', level: 'INFO', message: 'Application started.' },
      { timestamp: '2024‑04‑26T12:35:10Z', level: 'WARN', message: 'User “admin” logged in.' },
      { timestamp: '2024‑04‑26T12:35:20Z', level: 'ERROR', message: 'Failed to connect to database.' },
      { timestamp: '2024‑04‑26T12:36:00Z', level: 'DEBUG', message: 'Debug data: { … }' }
    ];
    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString();
    }
    logs.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `<strong>[${entry.level}]</strong> ${formatDate(entry.timestamp)}: ${entry.message}`;
      logContainer.appendChild(div);
    });
  </script>
</body>
</html>
