<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>| PZ Palace |</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-color: #0b0b0b;
            --panel-bg: #13131b;
            --accent-color: #4f378b;
            --glow-color: #6750a4;
            --text-color: #e6e1e5;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --plyr-color-main: var(--accent-color);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
        }

        nav { display: flex; gap: 20px; margin-top: 40px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .nav-btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .nav-btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--glow-color);
            transform: translateY(-2px);
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .video-section { text-align: center; }
        .video-container {
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(79, 55, 139, 0.3);
            margin-bottom: 20px;
        }

        h2 { color: var(--accent-color); margin-bottom: 10px; font-size: 1.8rem; }
        p { color: #b0b0b0; line-height: 1.6; }

        .lang-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
        }
        .lang-btn-main {
            background: var(--panel-bg);
            border: 1px solid var(--accent-color);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .lang-menu {
            position: absolute;
            bottom: 70px;
            left: 0;
            width: 180px;
            background: rgba(19, 19, 27, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-color);
            border-radius: 12px;
            padding: 8px;
            display: flex; flex-direction: column; gap: 5px;
            opacity: 0; visibility: hidden;
            transform: translateY(10px);
            transition: 0.3s;
        }
        .lang-container:hover .lang-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .lang-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }
        .lang-btn:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <nav>
        <a href="#episodes" class="nav-btn" id="nav-episodes">Episodes</a>
        <a href="#concept" class="nav-btn" id="nav-concept">Concept Art</a>
        <a href="#models" class="nav-btn" id="nav-models">3D Models</a>
        <a href="#music" class="nav-btn" id="nav-music">Music</a>
        <a href="#socials" class="nav-btn" id="nav-socials">Socials</a>
    </nav>

    <div class="container video-section" id="episodes">
        <h2 id="title-episodes">Uhh have this video for now (go to 1:24 hehe)</h2>
        <p id="desc-episodes">Freddy fazbear dancing haha</p>
        <div class="video-container">
            <video id="player" playsinline controls>
                <source src="https://scutiweb.s3.us-east-2.amazonaws.com/Videos/Five+Nights+at+Freddy's+Movie+End+Credits+Song+(The+Newton+Brothers).mp4" type="video/mp4" />
            </video>
        </div>
    </div>

    <div class="lang-container">
        <button class="lang-btn-main">🌐 Language / Idioma</button>
        <div class="lang-menu">
            <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 English</button>
            <button class="lang-btn" onclick="setLanguage('pt')">🇧🇷 Português (BR)</button>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
